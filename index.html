<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>IA Daily Pulse</title>
    <meta
      name="description"
      content="Veille quotidienne minimaliste et moderne sur l'intelligence artificielle."
    />

    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-stone-50 text-slate-900">
    <div class="mx-auto max-w-5xl px-4 py-10 sm:py-14">
      <header class="mb-10 sm:mb-14">
        <div class="flex flex-col gap-3 sm:flex-row sm:items-end sm:justify-between">
          <div>
            <h1 class="text-3xl font-semibold tracking-tight sm:text-4xl">IA Daily Pulse</h1>
            <p class="mt-2 text-sm text-slate-600">
              Une sélection courte, propre, et lisible.
            </p>
          </div>

          <div class="rounded-xl border border-slate-200 bg-white/70 px-4 py-3 shadow-sm">
            <p class="text-xs font-medium uppercase tracking-wide text-slate-500">Date</p>
            <p id="today" class="text-sm font-semibold text-slate-900">—</p>
          </div>
        </div>
      </header>

      <main>
        <div class="mb-5 flex items-center justify-between">
          <h2 class="text-lg font-semibold tracking-tight">Dernières actus</h2>
          <button
            id="refresh"
            type="button"
            class="rounded-lg border border-slate-200 bg-white px-3 py-2 text-sm font-medium text-slate-700 shadow-sm transition hover:bg-slate-50 focus:outline-none focus:ring-2 focus:ring-slate-300"
          >
            Recharger
          </button>
        </div>

        <div id="status" class="hidden rounded-xl border border-slate-200 bg-white p-4 text-sm text-slate-700"></div>

        <section
          id="newsGrid"
          class="grid grid-cols-1 gap-5 sm:grid-cols-2 lg:grid-cols-3"
          aria-label="Articles"
        ></section>
      </main>

      <footer class="mt-12 border-t border-slate-200 pt-6 text-xs text-slate-500">
        <p>
          Données chargées depuis <span class="font-mono">news.json</span>. Modifie ce fichier pour
          publier ta veille.
        </p>
      </footer>
    </div>

    <script>
      const $ = (id) => document.getElementById(id);

      function setToday() {
        const now = new Date();
        const formatted = new Intl.DateTimeFormat("fr-FR", {
          weekday: "long",
          year: "numeric",
          month: "long",
          day: "numeric",
        }).format(now);
        $("today").textContent = formatted.charAt(0).toUpperCase() + formatted.slice(1);
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#039;");
      }

      function tagClasses(tag) {
        const t = String(tag || "").toLowerCase();
        if (t.includes("tech")) return "bg-sky-50 text-sky-700 ring-sky-200";
        if (t.includes("produit")) return "bg-emerald-50 text-emerald-700 ring-emerald-200";
        if (t.includes("polit")) return "bg-amber-50 text-amber-800 ring-amber-200";
        return "bg-slate-50 text-slate-700 ring-slate-200";
      }

      function renderArticles(articles) {
        const grid = $("newsGrid");
        grid.innerHTML = "";

        for (const item of articles) {
          const tag = escapeHtml(item.tag ?? "Actu");
          const title = escapeHtml(item.title ?? "Sans titre");
          const summary = escapeHtml(item.summary ?? "");
          const url = String(item.url ?? "").trim();

          const a11yTitle = title || "Lire l'article";
          const safeUrl =
            url && (url.startsWith("https://") || url.startsWith("http://") || url.startsWith("/"))
              ? url
              : "#";

          const card = document.createElement("article");
          card.className =
            "group rounded-2xl border border-slate-200 bg-white p-5 shadow-sm transition hover:-translate-y-0.5 hover:shadow-md";

          card.innerHTML = `
            <div class="flex items-center justify-between gap-3">
              <span class="inline-flex items-center rounded-full px-2.5 py-1 text-xs font-medium ring-1 ring-inset ${tagClasses(
                tag
              )}">
                ${tag}
              </span>
            </div>

            <h3 class="mt-4 line-clamp-2 text-base font-semibold tracking-tight text-slate-900">
              ${title}
            </h3>

            <p class="mt-2 line-clamp-4 text-sm leading-relaxed text-slate-600">
              ${summary}
            </p>

            <div class="mt-5">
              <a
                href="${escapeHtml(safeUrl)}"
                target="_blank"
                rel="noreferrer"
                aria-label="${escapeHtml(a11yTitle)}"
                class="inline-flex items-center gap-2 text-sm font-semibold text-slate-900 underline decoration-slate-300 underline-offset-4 transition group-hover:decoration-slate-500"
              >
                Lire l'article
                <span aria-hidden="true" class="text-slate-400">→</span>
              </a>
            </div>
          `;

          grid.appendChild(card);
        }
      }

      function showStatus(message, kind = "info") {
        const el = $("status");
        el.classList.remove("hidden");
        el.textContent = message;
        el.className =
          "rounded-xl border p-4 text-sm " +
          (kind === "error"
            ? "border-rose-200 bg-rose-50 text-rose-800"
            : "border-slate-200 bg-white text-slate-700");
      }

      function hideStatus() {
        const el = $("status");
        el.classList.add("hidden");
      }

      async function loadNews() {
        hideStatus();
        try {
          const res = await fetch("news.json", { cache: "no-store" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);

          const data = await res.json();
          const articles = Array.isArray(data) ? data : data.articles;

          if (!Array.isArray(articles)) {
            throw new Error("Format inattendu: attendu un tableau ou { articles: [...] }");
          }

          if (articles.length === 0) {
            showStatus("Aucun article dans news.json pour le moment.");
          }

          renderArticles(articles);
        } catch (err) {
          showStatus(
            `Impossible de charger news.json. Ouvre index.html via un serveur local (pas en double-clic) ou vérifie le fichier. Détail: ${err.message}`,
            "error"
          );
          renderArticles([]);
        }
      }

      setToday();
      $("refresh").addEventListener("click", loadNews);
      loadNews();
    </script>
  </body>
</html>
